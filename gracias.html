<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias! · Desbloquea tu Crecimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:#08090f;
  color:#f8f5ee;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
}
.card{
  max-width:520px;
  text-align:center;
}
.icon{
  font-size:48px;
  margin-bottom:24px;
  display:block;
}
h1{
  font-family:'Fraunces',serif;
  font-size:clamp(36px,6vw,52px);
  font-weight:900;
  line-height:1;
  letter-spacing:-.03em;
  margin-bottom:16px;
}
h1 em{font-style:italic;color:#f5d84a}
p{
  font-size:17px;
  color:rgba(248,245,238,.65);
  font-weight:300;
  line-height:1.7;
  margin-bottom:32px;
}
p strong{color:#f8f5ee;font-weight:500}
.btn{
  display:inline-block;
  background:#1a4fd6;
  color:#fff;
  font-family:'Fraunces',serif;
  font-size:16px;
  font-weight:900;
  padding:14px 32px;
  text-decoration:none;
  border-radius:3px;
  transition:background .15s;
}
.btn:hover{background:#1340b0}
.sub{
  font-size:13px;
  color:rgba(248,245,238,.3);
  margin-top:20px;
}
</style>
</head>
<body>
<div class="card">
  <span class="icon">✓</span>
  <h1>Ya está<br><em>en camino.</em></h1>
  <p>Revisa tu email en los próximos minutos. <strong>La guía te está esperando.</strong><br>Si no la ves, mira en spam — y sácala de ahí.</p>
  <a href="https://desbloqueatucrecimiento.github.io/ElDesordenPara" class="btn">Volver a la página →</a>
  <p class="sub">Sin spam. Sin rollos. Te puedes dar de baja cuando quieras.</p>
</div>
</body>
</html>
